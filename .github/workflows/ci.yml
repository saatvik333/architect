name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --group dev --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --group dev --locked
      - run: uv run mypy libs/ services/ apps/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --group dev --locked
      - run: uv run pytest libs/ services/ apps/ -x -q --tb=short

  integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: architect
          POSTGRES_PASSWORD: architect_dev
          POSTGRES_DB: architect
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --group dev --locked
      - run: uv run pytest tests/integration/ -m integration -x -q --tb=short
        env:
          ARCHITECT_PG_HOST: localhost
          ARCHITECT_REDIS_HOST: localhost
