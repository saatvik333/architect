name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - "SECURITY.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE*"
      - "SECURITY.md"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run mypy libs/ services/ apps/

  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run pytest libs/ services/ apps/ -x -q --tb=short --cov=libs --cov=services --cov=apps --cov-report=xml --cov-fail-under=75
        env:
          ARCHITECT_PG_PASSWORD: ci_test_password
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - name: Bandit SAST scan
        run: uv run bandit -r libs/ services/ apps/ -ll --exclude "tests,*/tests" -f json -o bandit-report.json
      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
      - name: pip-audit CVE scan
        run: uv run pip-audit --format json -o pip-audit-report.json
      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: architect
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: architect
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        # CI Redis runs without auth intentionally — service containers are
        # isolated to the runner and not reachable externally. Production and
        # local-dev Redis require ARCHITECT_REDIS_PASSWORD (set by dev-setup.sh).
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run pytest tests/integration/ -m integration -x -q --tb=short
        env:
          ARCHITECT_PG_HOST: localhost
          ARCHITECT_PG_PASSWORD: ci_test_password
          ARCHITECT_REDIS_HOST: localhost
