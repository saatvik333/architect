name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run mypy libs/ services/ apps/

  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run pytest libs/ services/ apps/ -x -q --tb=short --cov=libs --cov=services --cov=apps --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - name: Bandit SAST scan
        run: uv run bandit -r libs/ services/ apps/ -ll --exclude tests -f json -o bandit-report.json || true
      - name: Upload Bandit results
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

  integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: architect
          POSTGRES_PASSWORD: architect_dev
          POSTGRES_DB: architect
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --all-packages --group dev --locked
      - run: uv run pytest tests/integration/ -m integration -x -q --tb=short
        env:
          ARCHITECT_PG_HOST: localhost
          ARCHITECT_REDIS_HOST: localhost
