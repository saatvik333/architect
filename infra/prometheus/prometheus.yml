global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "architect-gateway"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: "architect-world-state"
    static_configs:
      - targets: ["host.docker.internal:8001"]
    metrics_path: /metrics

  - job_name: "architect-task-graph"
    static_configs:
      - targets: ["host.docker.internal:8003"]
    metrics_path: /metrics

  - job_name: "architect-sandbox"
    static_configs:
      - targets: ["host.docker.internal:8007"]
    metrics_path: /metrics

  - job_name: "architect-eval-engine"
    static_configs:
      - targets: ["host.docker.internal:8008"]
    metrics_path: /metrics

  - job_name: "architect-coding-agent"
    static_configs:
      - targets: ["host.docker.internal:8009"]
    metrics_path: /metrics

  - job_name: "architect-spec-engine"
    static_configs:
      - targets: ["host.docker.internal:8010"]
    metrics_path: /metrics

  - job_name: "architect-router"
    static_configs:
      - targets: ["host.docker.internal:8011"]
    metrics_path: /metrics

  - job_name: "architect-codebase"
    static_configs:
      - targets: ["host.docker.internal:8012"]
    metrics_path: /metrics

  - job_name: "architect-comm-bus"
    static_configs:
      - targets: ["host.docker.internal:8013"]
    metrics_path: /metrics
