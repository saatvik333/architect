repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: mypy
        name: mypy (typecheck)
        entry: uv run mypy libs/ services/ apps/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: bandit
        name: bandit (SAST)
        entry: uv run bandit -r libs/ services/ apps/ -ll --exclude "tests,*/tests" -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest (unit)
        entry: uv run pytest libs/ services/ apps/ -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
