repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit)
        entry: uv run pytest libs/ services/ apps/ -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
